<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <circle cx="64" cy="64" r="64" fill="#1e1e1e"/>
  
  <!-- Outer circle ring -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#007acc" stroke-width="2"/>
  
  <!-- Speaker cone -->
  <circle cx="64" cy="64" r="36" fill="#007acc" opacity="0.9"/>
  <circle cx="64" cy="64" r="28" fill="#1e1e1e"/>
  
  <!-- Center speaker dot -->
  <circle cx="64" cy="64" r="16" fill="#007acc" opacity="0.8"/>
  <circle cx="64" cy="64" r="10" fill="#1e1e1e"/>
  
  <!-- Sound waves -->
  <path d="M 92 64 Q 98 58 102 48" fill="none" stroke="#007acc" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 92 64 Q 98 70 102 80" fill="none" stroke="#007acc" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Musical note accent -->
  <g transform="translate(28, 32)">
    <line x1="0" y1="0" x2="0" y2="16" stroke="#007acc" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="4" x2="8" y2="20" stroke="#007acc" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 0 0 Q 4 -2 8 4" fill="none" stroke="#007acc" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>